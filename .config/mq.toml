mode = "parallelqueue"
build = "nx"

[trunk]
api = "api.trunk-staging.io"

[git]
name = "trunk bot"
email = "bot@trunk.io"

[test]
flake_rate = 0.10
# how long test should spin for (can be described as 10s, 7m, 1hr)
sleep_for = "5m"

[pullrequest]
labels = ""                     # label to apply to pull request on creation (comma separated list)
comment = ""
requests_per_hour = 250         # target number of pull requests per hour
run_generate_for = "30 minutes"
change_code_path = "nx"
protected_branches = ["main"] # set protected_branches to automate generation on one or many branches

# how to distribute changes of impacted deps
# 55% - 1 dep change
# 35% - 2 dep change
# 9%  - 3 deps
# 1% - ALL will be specified
deps_distribution = "0.55x1,0.35x2,0.09x3,0.01xALL"

# Distribution of stack depths for generated PRs.
# Format: "0.8x1,0.2x2" means 80% of the PR budget is solo PRs (depth 1)
# and 20% is grouped into 2-deep stacks. Each stack consumes N PR slots
# from the total budget (requests_per_run / requests_per_hour).
# Stacked PRs are built on top of each other using `gh pr create --base`
# targeting the prior PR's head branch. If not set, all PRs are solo.
stacks_distribution = "0.80x2,0.20x3"

# rate at which PRs should simulate a logical merge conflict and need to be rejected
logical_conflict_every = 100
logical_conflict_file = "logical-conflict.txt"

close_stale_after = "48 hours"

[merge]
# trigger = "api"
# label to apply to pull request to queue
labels = ""
# comment to post to queue
comment = "/trunk merge"
