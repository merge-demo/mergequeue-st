name: PR Testing
run-name: PR Checks for ${{ github.ref_name }}
on:
  pull_request: {}
  push:
    branches:
      - trunk-merge/**

# Concurrency group so we can detect duplicate runs (pull_request + push for same branch).
# We do not cancel in progress - the duplicate run will skip so MQ doesn't see a failure.
concurrency:
  group: pr-test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    name: run tests on ${{ github.event_name == 'pull_request' && 'PR' || 'push' }}
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # On push: if this branch has an open PR, skip so the pull_request trigger handles it (avoid duplicate work).
      # On pull_request: always run (we are the PR run).
      - name: Check for duplicate run
        id: duplicate
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'pull_request') {
              core.setOutput('skip_duplicate', 'false');
              return;
            }
            const branch = process.env.BRANCH_NAME;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            core.setOutput('skip_duplicate', pulls.length > 0 ? 'true' : 'false');
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

      - uses: robinraju/release-downloader@v1.9
        if: steps.duplicate.outputs.skip_duplicate != 'true'
        with:
          repository: trunk-io/mergequeue-tool
          latest: true
          tarBall: true
          preRelease: false
          extract: true

      - name: Make mq executable
        if: steps.duplicate.outputs.skip_duplicate != 'true'
        run: chmod +x ./mq

      - name: Determine is_merge
        id: check_is_merge
        if: steps.duplicate.outputs.skip_duplicate != 'true'
        run: |
          if [[ ${GITHUB_EVENT_NAME} == "push" && (${GITHUB_REF_NAME} == trunk-merge/* || ${GITHUB_REF_NAME} == trunk-merge-beta/*) || "${{ github.event.pull_request.title }}" == trunk-merge/*  ]]; then
            echo "on_merge=true" >> $GITHUB_OUTPUT
          else
          echo "on_merge=false" >> $GITHUB_OUTPUT
          fi

      # Fast-pass PRs whose source branch starts with "e2e" for both the
      # regular PR flow and the merge flow. During a merge run we inspect
      # every original PR folded into the trunk-merge branch; we only
      # fast-pass if all of them are e2e branches.
      - name: Check for e2e fast-pass
        id: fast_pass
        if: steps.duplicate.outputs.skip_duplicate != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const isE2e = (name) => !!name && name.startsWith('e2e');

            if (context.eventName === 'pull_request') {
              const headRef = context.payload.pull_request.head.ref;
              const title = context.payload.pull_request.title || '';
              core.info(`pull_request head ref: ${headRef}`);
              if (!title.startsWith('trunk-merge/')) {
                core.setOutput('fast_pass', isE2e(headRef) ? 'true' : 'false');
                return;
              }
              // trunk-merge PR opened against main: fall through to inspect
              // the folded-in PRs via the branch commits.
            }

            const branch = process.env.BRANCH_NAME;
            const base = context.payload.pull_request
              ? context.payload.pull_request.base.ref
              : 'main';

            const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `${base}...${branch}`,
            });

            const branches = new Set();
            for (const commit of comparison.commits) {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: commit.sha,
              });
              for (const pr of prs) {
                if ((pr.title || '').startsWith('trunk-merge/')) continue;
                branches.add(pr.head.ref);
              }
            }

            if (branches.size === 0) {
              core.info('No original PRs found on merge branch; not fast-passing.');
              core.setOutput('fast_pass', 'false');
              return;
            }

            core.info(`Folded-in PR branches: ${[...branches].join(', ')}`);
            core.setOutput('fast_pass', [...branches].every(isE2e) ? 'true' : 'false');
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

      - name: run tests
        id: test
        # only actually run the test if we're on the merge branch
        # so we can simulate delay and flakiness. Branches prefixed with
        # "e2e" fast-pass without invoking the test simulator.
        if:
          steps.duplicate.outputs.skip_duplicate != 'true' && steps.check_is_merge.outputs.on_merge
          == 'true' && steps.fast_pass.outputs.fast_pass != 'true'
        run: |
          ./mq test-sim
        env:
          IS_MERGE: ${{ steps.check_is_merge.outputs.on_merge }}
